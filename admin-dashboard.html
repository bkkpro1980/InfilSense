<!DOCTYPE html>
<html lang="en">
<head>
    <title>InfilSense Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Media/InfilSenseTransparentLogo.png">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="header"></div>
    <div class="admin-dashboard-container" style="margin-top: 50px;">
        <h2>Admin Database Management</h2>
        <p>Manage license keys and user connections below.</p>
        
        <div class="table-section">
            <h3>License Keys</h3>
            <input type="text" id="keys-search" class="table-search" placeholder="Search license keys..." />
            <div class="table-container">
                <table id="keys-table">
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Key Data</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <h3>User Connections</h3>
            <input type="text" id="connected-keys-search" class="table-search" placeholder="Search user IDs..." />
            <div class="table-container">
                <table id="connected-keys-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Connection Data</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3 id="modal-title">Edit Entry</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-path">
                <textarea id="edit-data" rows="10" placeholder="Edit the JSON data for this entry..."></textarea>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="admin.js"></script>
    <script src="main.js"></script>
</body>
</html>
